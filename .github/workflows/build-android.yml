name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'memory_ai_flutter/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Java环境
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: 设置Flutter环境
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        
    - name: 获取Flutter依赖
      working-directory: ./memory_ai_flutter
      run: flutter pub get
      
    - name: 构建Android APK
      working-directory: ./memory_ai_flutter
      run: flutter build apk --release
      
    - name: 上传APK到Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: memory_ai_flutter/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        
    - name: 创建Release (仅在推送到main/master时)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          ## 追忆彼岸 Android 版本
          
          **构建时间**: ${{ github.event.head_commit.timestamp }}
          **提交信息**: ${{ github.event.head_commit.message }}
          
          ### 下载说明
          - 下载 `app-release.apk` 文件
          - 在Android手机上安装即可使用
          
        files: |
          memory_ai_flutter/build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
